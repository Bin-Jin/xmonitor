<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMeta 典藏量化监控终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#020617', 
                        darker: '#000000', 
                        brand: '#3b82f6', 
                        accent: '#6366f1',
                        alert: '#f43f5e', 
                        success: '#10b981', 
                        warning: '#f59e0b'
                    },
                    animation: { 
                        'shake': 'shake 0.5s both infinite',
                        'ping-slow': 'ping 3s infinite',
                        'flame': 'flame 1.5s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(1px, 0, 0)' },
                        },
                        flame: {
                            'from': { opacity: 0.5, transform: 'scale(0.95)' },
                            'to': { opacity: 1, transform: 'scale(1.1)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background-color: #000000; /* 纯黑背景解决文字重叠 */
            color: #f8fafc; 
            overflow-x: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .glass-panel { 
            background: rgba(15, 23, 42, 0.95); /* 高不透明度面板 */
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .grid-bg { 
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.4); border-radius: 10px; }
        
        .price-card {
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.03);
        }
        .price-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(59, 130, 246, 0.5);
            transform: translateX(4px);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }
        
        .heat-glow {
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.2);
            border-color: rgba(244, 63, 94, 0.4) !important;
        }
    </style>
</head>
<body class="min-h-screen grid-bg">

    <!-- 全局警报 -->
    <div id="global-alert" class="hidden fixed top-4 left-1/2 -translate-x-1/2 w-[90%] max-w-lg z-[100] bg-alert p-4 rounded-2xl shadow-2xl flex items-center justify-between border border-white/20">
        <div class="flex items-center gap-3">
            <i class="ph-fill ph-warning-octagon text-2xl animate-bounce"></i>
            <span id="alert-detail" class="text-sm font-bold tracking-tight">--</span>
        </div>
        <button onclick="dismissGlobalAlert()" class="bg-black/20 px-4 py-1 rounded-lg text-xs font-bold hover:bg-black/40 transition-all">忽略</button>
    </div>

    <!-- 提示框 -->
    <div id="toast-msg" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] transform transition-all duration-500 translate-y-10 opacity-0 bg-white text-darker px-8 py-4 rounded-2xl shadow-2xl font-black flex items-center gap-3 pointer-events-none">
        <i class="ph-bold ph-lightning text-brand text-xl"></i>
        <span id="toast-text" class="text-sm">操作成功</span>
    </div>

    <div class="max-w-[1600px] mx-auto p-4 md:p-6 lg:p-8 space-y-6">
        
        <header class="grid grid-cols-1 xl:grid-cols-12 gap-6">
            <!-- 终端连接区 -->
            <div class="xl:col-span-4 glass-panel p-6 rounded-[2rem] flex flex-col justify-between">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-brand/10 rounded-2xl flex items-center justify-center border border-brand/30 shadow-inner">
                            <i class="ph-fill ph-shield-check text-2xl text-brand"></i>
                        </div>
                        <div>
                            <h1 class="text-xl font-black italic tracking-tighter text-white uppercase">XMeta <span class="text-brand">行情雷达</span></h1>
                            <div class="flex items-center gap-2">
                                <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-600"></div>
                                <span id="status-text" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">未连接</span>
                            </div>
                        </div>
                    </div>
                    <button id="export-btn" title="导出量化报表" onclick="downloadExcel()" class="hidden bg-success/20 hover:bg-success hover:text-white text-success px-3 py-2 rounded-xl transition-all border border-success/30">
                        <i class="ph-bold ph-download-simple"></i>
                    </button>
                </div>
                
                <div class="mt-6 space-y-3">
                    <div class="space-y-1">
                        <label class="text-[10px] text-slate-500 font-black uppercase tracking-widest ml-1">推送身份 (WxPusher UID)</label>
                        <input id="user-uid" type="text" placeholder="UID_..." class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-xs text-brand font-mono focus:outline-none focus:border-brand/50 transition-all">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-slate-500 font-black uppercase tracking-widest ml-1">数据接口地址</label>
                        <div class="flex gap-2">
                            <input id="api-url" type="text" value="http://127.0.0.1:5000" class="flex-1 bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-xs text-white font-mono focus:outline-none transition-all">
                            <button onclick="toggleMonitor()" id="start-btn" class="btn-gradient px-6 rounded-xl text-[10px] font-black uppercase tracking-widest text-white hover:scale-105 active:scale-95 transition-all">开始监控</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 数据总览区 -->
            <div class="xl:col-span-8 glass-panel p-8 rounded-[2rem] flex flex-col md:flex-row items-center justify-between gap-8 relative overflow-hidden">
                <div class="flex-1">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-2">行情平均地板价指数</p>
                    <div class="flex items-baseline gap-2">
                        <span class="text-xl font-bold text-slate-600 font-mono">¥</span>
                        <span id="avg-price" class="text-7xl font-extrabold text-white font-mono tracking-tighter leading-none">0.00</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-12 border-l border-white/10 pl-10">
                    <div>
                        <p class="text-[10px] text-slate-500 font-black uppercase mb-1">监控项目</p>
                        <p id="item-count" class="text-3xl font-black text-white font-mono leading-none">0</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-500 font-black uppercase mb-1">最后同步</p>
                        <p id="sync-time" class="text-3xl font-black text-brand font-mono tracking-tighter leading-none">--:--</p>
                    </div>
                </div>
            </div>
        </header>

        <main class="grid grid-cols-1 xl:grid-cols-12 gap-6 items-start">
            <!-- 实时雷达列表 -->
            <div class="xl:col-span-4 h-[750px] flex flex-col glass-panel rounded-[2rem] overflow-hidden shadow-2xl">
                <div class="p-6 border-b border-white/5 flex items-center justify-between bg-white/5">
                    <h3 class="font-black text-white flex items-center gap-2 uppercase text-xs tracking-widest">
                        <i class="ph-bold ph-activity text-brand"></i> 实时行情流
                    </h3>
                    <span class="text-[9px] font-mono text-slate-500 animate-pulse uppercase">Live Syncing...</span>
                </div>
                <div id="price-list" class="flex-1 overflow-y-auto p-4 space-y-2 log-container">
                    <div class="h-full flex flex-col items-center justify-center opacity-30 text-xs italic uppercase tracking-widest gap-4">
                        <i class="ph ph-circle-dashed text-4xl animate-spin"></i>
                        <span>正在建立数据链路...</span>
                    </div>
                </div>
            </div>

            <!-- 预警与趋势图 -->
            <div class="xl:col-span-8 space-y-6">
                <!-- 预警面板 -->
                <div class="glass-panel p-8 rounded-[2rem] border-l-4 border-brand shadow-2xl">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-sm font-black text-white flex items-center gap-3 uppercase tracking-widest">
                            <i class="ph-fill ph-target text-brand text-xl"></i> 私人定制哨兵
                        </h2>
                        <span id="alert-count" class="text-[10px] font-black px-4 py-1 rounded-full bg-white/5 text-slate-400">活跃任务: 0</span>
                    </div>
                    
                    <div class="flex gap-4">
                        <input id="alert-name" type="text" placeholder="输入藏品名关键字..." class="flex-1 bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-sm text-white focus:outline-none focus:border-brand/50 transition-all">
                        <input id="alert-price" type="number" placeholder="价格" class="w-32 bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-sm text-white font-mono focus:outline-none">
                        <button onclick="addAlert()" class="bg-white text-darker font-black px-8 rounded-2xl text-[10px] uppercase hover:bg-brand hover:text-white transition-all tracking-widest active:scale-95">添加</button>
                    </div>
                    
                    <div id="active-alerts" class="mt-6 flex flex-wrap gap-2"></div>
                </div>

                <!-- 趋势图表 -->
                <div class="glass-panel p-8 rounded-[2rem] h-[385px] shadow-2xl">
                    <div class="flex items-center justify-between mb-4">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">平均地板价趋势 (近 30 次采样)</p>
                    </div>
                    <div class="h-[280px]">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 警报声音 -->
    <audio id="alert-audio" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        let isRunning = false, chartInstance = null, priceHistory = [], labels = [], userAlerts = [];

        function showToast(msg, isWarning=false) {
            const toast = document.getElementById('toast-msg');
            document.getElementById('toast-text').innerText = msg;
            toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] transform transition-all duration-500 translate-y-0 opacity-100 px-8 py-4 rounded-2xl shadow-2xl font-black flex items-center gap-3 pointer-events-none ${isWarning ? 'bg-alert text-white' : 'bg-white text-darker'}`;
            setTimeout(() => {
                toast.classList.replace('translate-y-0', 'translate-y-10');
                toast.classList.replace('opacity-100', 'opacity-0');
            }, 3000);
        }

        window.onload = () => {
            initChart();
            if(localStorage.getItem('xmeta_url')) document.getElementById('api-url').value = localStorage.getItem('xmeta_url');
            if(localStorage.getItem('xmeta_uid')) document.getElementById('user-uid').value = localStorage.getItem('xmeta_uid');
            if(localStorage.getItem('xmeta_alerts')) { 
                try { userAlerts = JSON.parse(localStorage.getItem('xmeta_alerts')); renderAlertTags(); } catch(e) { userAlerts = []; }
            }
        };

        async function downloadExcel() {
            if (!isRunning) return;
            const baseUrl = document.getElementById('api-url').value.replace(/\/$/, "");
            showToast("正在导出量化行情复盘表...");
            try {
                const res = await fetch(`${baseUrl}/download_report`, { headers: { 'ngrok-skip-browser-warning': 'true' }});
                if(!res.ok) throw new Error();
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); 
                a.href = url; 
                a.download = `XMeta分析表_${new Date().toLocaleDateString()}.csv`; 
                a.click();
                showToast("✅ 下载已开始");
            } catch (e) { showToast("下载失败，请检查后端状态", true); }
        }

        function toggleMonitor() {
            if (isRunning) return;
            const uid = document.getElementById('user-uid').value.trim();
            if(!uid) return alert("请先填写 WxPusher UID 推送标识！");
            
            localStorage.setItem('xmeta_url', document.getElementById('api-url').value);
            localStorage.setItem('xmeta_uid', uid);
            
            isRunning = true;
            document.getElementById('start-btn').innerText = "已连接";
            document.getElementById('start-btn').disabled = true;
            document.getElementById('start-btn').className = "bg-slate-800 text-slate-500 px-6 rounded-xl text-[10px] font-black cursor-not-allowed";
            document.getElementById('export-btn').classList.remove('hidden');
            
            syncAlertsToBackend();

            const fetchTask = async () => {
                const api = document.getElementById('api-url').value.replace(/\/$/, "");
                try {
                    const res = await fetch(`${api}/prices`, { headers: { 'ngrok-skip-browser-warning': 'true' }});
                    const result = await res.json();
                    if (result.status === 'success') {
                        document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-success animate-ping-slow";
                        document.getElementById('status-text').innerText = "接收实时行情中";
                        updateUI(result);
                    }
                } catch (e) {
                    document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-alert";
                    document.getElementById('status-text').innerText = "连接丢失";
                }
            };
            fetchTask();
            setInterval(fetchTask, 15000); 
        }

        function updateUI(result) {
            const listContainer = document.getElementById('price-list');
            listContainer.innerHTML = "";
            document.getElementById('item-count').innerText = result.data.length;
            document.getElementById('sync-time').innerText = result.time;

            const heats = result.heat || {};

            result.data.forEach(item => {
                const heat = heats[item.name] || 0;
                const isUp = item.change > 0, isDown = item.change < 0;
                const color = isUp ? 'text-alert' : (isDown ? 'text-success' : 'text-slate-500');
                const trendIcon = isUp ? 'ph-bold ph-caret-up' : (isDown ? 'ph-bold ph-caret-down' : 'ph-bold ph-minus');
                const isAlert = userAlerts.some(a => item.name.includes(a.name) && item.price <= a.price);

                listContainer.innerHTML += `
                    <div class="price-card flex items-center justify-between p-4 rounded-2xl border border-white/5 ${heat > 0 ? 'heat-glow' : ''} ${isAlert ? 'bg-alert/10 border-alert animate-shake' : ''}">
                        <div class="flex-1 min-w-0 pr-4">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-sm font-extrabold text-white truncate">${item.name}</span>
                                ${heat > 0 ? `<span class="flex items-center gap-1 text-alert animate-flame"><i class="ph-fill ph-fire text-xs"></i><span class="text-[10px] font-black">${heat}</span></span>` : ''}
                            </div>
                            <div class="flex items-center gap-1.5 ${color} text-[9px] font-black uppercase tracking-tighter">
                                <i class="${trendIcon}"></i>
                                <span>${item.is_new ? '初次录入' : Math.abs(item.change).toFixed(1) + ' (' + item.rate + '%)'}</span>
                            </div>
                        </div>
                        <div class="text-right">
                             <div class="text-[8px] text-slate-500 font-bold uppercase mb-0.5 tracking-widest">最低地板</div>
                             <div class="text-base font-black font-mono text-success tracking-tight">¥${parseFloat(item.price).toFixed(2)}</div>
                        </div>
                    </div>
                `;
                if(isAlert) triggerVisualAlert(item.name, item.price);
            });

            let prices = result.data.map(i => i.price).filter(p => p > 0).sort((a,b)=>a-b);
            let avg = prices.length ? (prices.reduce((a,b)=>a+b,0)/prices.length) : 0;
            document.getElementById('avg-price').innerText = avg.toFixed(2);
            
            priceHistory.push(avg); labels.push("");
            if(priceHistory.length > 30) { priceHistory.shift(); labels.shift(); }
            chartInstance.update();
        }

        function triggerVisualAlert(name, price) {
            const el = document.getElementById('global-alert');
            el.classList.remove('hidden');
            document.getElementById('alert-detail').innerText = `监测中：${name} 已低至预警线: ¥${price.toFixed(2)}`;
            document.getElementById('alert-audio').play().catch(()=>{});
        }

        function dismissGlobalAlert() { document.getElementById('global-alert').classList.add('hidden'); }

        async function syncAlertsToBackend() {
            if(!isRunning) return;
            const api = document.getElementById('api-url').value.replace(/\/$/, "");
            const uid = document.getElementById('user-uid').value.trim();
            try {
                await fetch(`${api}/update_alerts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ uid: uid, alerts: userAlerts.map(a => ({ name: a.name, target_price: a.price })) })
                });
                showToast("同步成功：个人规则已载入云端哨兵");
            } catch (e) {}
        }

        function addAlert() {
            const n = document.getElementById('alert-name').value.trim(), p = document.getElementById('alert-price').value;
            if (n && p) {
                userAlerts.push({name: n, price: parseFloat(p)});
                localStorage.setItem('xmeta_alerts', JSON.stringify(userAlerts));
                renderAlertTags(); syncAlertsToBackend();
                document.getElementById('alert-name').value = ""; document.getElementById('alert-price').value = "";
            }
        }

        function renderAlertTags() {
            document.getElementById('alert-count').innerText = `活跃任务: ${userAlerts.length}`;
            document.getElementById('active-alerts').innerHTML = userAlerts.map((a, i) => `
                <div class="bg-brand/10 border border-brand/20 pl-4 pr-2 py-2 rounded-xl text-[10px] flex items-center gap-3">
                    <span class="font-bold text-white tracking-tight">${a.name} < ¥${a.price}</span>
                    <button onclick="userAlerts.splice(${i},1);renderAlertTags();syncAlertsToBackend();" class="w-6 h-6 flex items-center justify-center rounded-lg hover:bg-alert/20 hover:text-alert transition-all">
                        <i class="ph ph-trash-simple"></i>
                    </button>
                </div>
            `).join('');
        }

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line', 
                data: { labels: labels, datasets: [{ data: priceHistory, borderColor: '#3b82f6', borderWidth: 4, tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)', pointRadius: 0 }] },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        x: { display: false }, 
                        y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#64748b', font: { family: 'JetBrains Mono', size: 10 } } } 
                    } 
                }
            });
        }
    </script>
</body>
</html>
