<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <meta name="color-scheme" content="dark">
    
    <title>XMeta 典藏行情终端 Pro Max</title>
    
    <!-- 🚀 网页标签栏 Logo (Favicon) -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60' fill='none'%3E%3Cpath d='M30 4L54 16V44L30 56L6 44V16L30 4Z' fill='%233b82f6'/%3E%3Cpath d='M22 30L28 42L42 18' stroke='white' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        (function() {
            const config = { 
                darkMode: 'class', 
                theme: { extend: { colors: { bgDark: '#12161b', cardDark: '#1a1e24', brand: '#3b82f6', price: '#00d8a6', up: '#ff4d4f', down: '#00d8a6' } } } 
            };
            if (typeof tailwind !== 'undefined') {
                tailwind.config = config;
            } else {
                window.addEventListener('load', () => { if (typeof tailwind !== 'undefined') tailwind.config = config; });
            }
        })();
    </script>
    <style>
        :root { --brand: #3b82f6; --up: #ff4d4f; --price: #00d8a6; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #12161b; }
        ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 10px; }

        body { 
            background-color: #12161b; 
            color: #e2e8f0; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            user-select: none;
        }
        
        input::-ms-clear, input::-ms-reveal { display: none; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input:focus { outline: none !important; border-color: var(--brand) !important; }

        .glass-panel { background: #1a1e24; border: 1px solid rgba(255, 255, 255, 0.05); }
        .log-container::-webkit-scrollbar { width: 4px; }
        .tab-btn-active { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.1); }
        
        .item-row { backface-visibility: hidden; will-change: transform, opacity; }
        @keyframes flash-sync { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        .sync-flash { animation: flash-sync 0.4s ease-out; }

        .logo-glow { filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5)); }
        @keyframes pulse-ring { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
        .animate-logo-ring { animation: pulse-ring 3s infinite ease-in-out; }
    </style>
</head>
<body class="min-h-screen p-3 sm:p-4 md:p-6 lg:p-8">
    
    <div id="toast-msg" class="fixed bottom-10 right-4 sm:right-10 z-[200] transform transition-all duration-300 translate-y-20 opacity-0 bg-brand text-white px-4 sm:px-6 py-3 sm:py-4 rounded-xl shadow-2xl font-bold flex items-center gap-3 pointer-events-none text-xs sm:text-sm">
        <i class="ph-bold ph-check-circle text-xl sm:text-2xl"></i><span id="toast-text" class="tracking-wide">同步成功</span>
    </div>

    <div class="max-w-[1600px] mx-auto space-y-4 sm:space-y-6">
        <header class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6 items-stretch">
            <div class="lg:col-span-1 glass-panel p-5 sm:p-6 rounded-2xl flex flex-col justify-between shadow-xl">
                <div class="flex items-center gap-4">
                    <div class="relative shrink-0 animate-logo-ring">
                        <svg width="52" height="52" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-glow">
                            <path d="M30 4L54 16V44L30 56L6 44V16L30 4Z" stroke="#3b82f6" stroke-width="1.5" stroke-linejoin="round"/>
                            <path d="M30 10L48 20V40L30 50L12 40V20L30 10Z" fill="url(#paint0_linear)" fill-opacity="0.2" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2 2"/>
                            <path d="M22 30L28 42L42 18" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <defs>
                                <linearGradient id="paint0_linear" x1="30" y1="4" x2="30" y2="56" gradientUnits="userSpaceOnUse">
                                    <stop stop-color="#3b82f6"/>
                                    <stop offset="1" stop-color="#1d4ed8"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="min-w-0">
                        <h1 class="text-lg sm:text-2xl font-black tracking-tighter text-white uppercase whitespace-nowrap overflow-visible">
                            <span class="text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">XM</span>
                            <span class="text-brand font-black ml-1" style="color: var(--brand)">典藏板块数据</span>
                        </h1>
                        <div class="flex items-center gap-2 mt-0.5"><div id="status-dot" class="w-2 h-2 rounded-full bg-gray-600 shrink-0"></div><span id="status-text" class="text-[9px] sm:text-[10px] font-mono text-slate-400 uppercase tracking-widest truncate">系统就绪 / 链路监听中</span></div>
                    </div>
                </div>
                <div class="mt-5 sm:mt-6 space-y-3">
                    <input id="user-uid" type="text" placeholder="WxPusher UID" class="w-full bg-[#12161b] border border-white/5 rounded-lg px-4 py-2 sm:py-2.5 text-xs text-white font-mono">
                    <div class="flex flex-col sm:flex-row gap-2 sm:gap-2">
                        <input id="api-url" type="text" placeholder="https://xxxx.cpolar.cn" class="w-full bg-[#12161b] border border-white/5 rounded-lg px-4 py-2 sm:py-2.5 text-xs text-white">
                        <button onclick="toggleMonitor()" id="start-btn" class="w-full sm:w-auto bg-brand hover:bg-blue-600 text-white px-5 py-2 sm:py-2.5 rounded-lg text-xs font-bold transition-all shadow-lg active:scale-95 shrink-0">启动链路</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 glass-panel p-5 sm:p-8 rounded-2xl border-t-2 border-brand flex flex-col md:flex-row items-center gap-4 sm:gap-10 shadow-xl" style="border-top-color: var(--brand)">
                <div class="w-full md:flex-1 text-center md:text-left">
                    <p class="text-[10px] sm:text-xs font-bold text-gray-500 uppercase tracking-widest mb-1 sm:mb-2 flex items-center justify-center md:justify-start gap-2"><i class="ph-bold ph-globe"></i> 典藏均价实时指数</p>
                    <div class="flex items-baseline justify-center md:justify-start gap-4"><span id="avg-price" class="text-4xl sm:text-6xl font-black text-white font-mono tracking-tighter">0.00</span></div>
                </div>
                <div class="w-full grid grid-cols-2 gap-4 sm:gap-8 border-t md:border-t-0 md:border-l border-white/5 pt-4 md:pt-0 md:pl-10 h-full py-2 text-center md:text-left">
                    <div><p class="text-[9px] sm:text-[10px] text-gray-500 font-bold uppercase mb-1">监控项目数</p><p id="item-count" class="text-lg sm:text-2xl font-bold text-white font-mono">0</p></div>
                    <div><p class="text-[9px] sm:text-[10px] text-gray-500 font-bold uppercase mb-1">最后同步</p><p id="sync-time" class="text-lg sm:text-2xl font-bold text-brand font-mono" style="color: var(--brand)">--:--:--</p></div>
                </div>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-4 sm:gap-6">
            <div class="lg:col-span-5 h-[500px] lg:h-[780px] flex flex-col glass-panel p-4 sm:p-6 rounded-2xl shadow-xl">
                <div class="flex flex-col sm:flex-row justify-between gap-3 mb-4 px-3 bg-[#12161b] py-3 rounded-xl border border-white/5 text-[10px] sm:text-[11px] font-bold">
                    <div class="flex items-baseline justify-between sm:justify-start gap-2 w-full sm:w-auto">
                        <span class="text-gray-500">总市值</span>
                        <div class="flex items-baseline gap-1">
                            <span id="global-market-rate"></span>
                            <span id="global-market-val" class="text-xs sm:text-sm font-black text-price font-mono" style="color: var(--price)">¥0</span>
                        </div>
                    </div>
                    <div class="flex items-baseline justify-between sm:justify-start gap-2 border-t sm:border-t-0 sm:border-l border-white/10 pt-2 sm:pt-0 sm:pl-4 w-full sm:w-auto">
                        <span class="text-gray-500">总成交</span>
                        <div class="flex items-baseline gap-1">
                            <span id="global-deal-rate"></span>
                            <span id="global-deal-val" class="text-xs sm:text-sm font-black text-price font-mono" style="color: var(--price)">0</span>
                        </div>
                    </div>
                </div>
                <div id="price-list" class="flex-1 overflow-y-auto space-y-2 log-container pr-1 sm:pr-2"></div>
            </div>

            <div class="lg:col-span-7 space-y-4 sm:space-y-6">
                <div class="glass-panel p-5 sm:p-8 rounded-2xl shadow-xl">
                    <h2 class="text-xs sm:text-sm font-black text-gray-400 flex items-center gap-2 mb-4 sm:mb-6 uppercase tracking-widest"><i class="ph-fill ph-target text-brand" style="color: var(--brand)"></i> 藏品价格预警</h2>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input id="alert-name" type="text" placeholder="关键字..." class="w-full sm:flex-1 bg-[#12161b] border border-white/5 rounded-xl px-4 py-2.5 sm:py-3 text-xs sm:text-sm text-white focus:border-brand">
                        <div class="flex gap-2 sm:gap-4 w-full sm:w-auto">
                            <select id="alert-type" class="bg-[#12161b] border border-white/5 rounded-xl px-2 py-2.5 sm:py-3 text-xs sm:text-sm text-white focus:outline-none focus:border-brand cursor-pointer">
                                <option value="down">跌破 ≤</option>
                                <option value="up">突破 ≥</option>
                            </select>
                            <input id="alert-price" type="number" placeholder="触发价" class="flex-1 sm:w-28 bg-[#12161b] border border-white/5 rounded-xl px-4 py-2.5 sm:py-3 text-xs sm:text-sm text-white font-mono focus:outline-none focus:border-brand">
                            <button onclick="addAlert()" class="bg-brand hover:bg-blue-600 text-white font-black rounded-xl px-4 sm:px-8 py-2.5 sm:py-3 text-[10px] sm:text-xs transition-all shadow-lg active:scale-95 shrink-0 whitespace-nowrap">部署任务</button>
                        </div>
                    </div>
                    <div id="active-alerts" class="mt-4 sm:mt-6 flex flex-wrap gap-2"></div>
                </div>

                <div class="glass-panel p-4 sm:p-6 rounded-2xl h-[300px] md:h-[420px] flex flex-col shadow-xl">
                    <div class="flex justify-between items-center mb-2 sm:mb-4">
                        <h3 class="text-[10px] sm:text-sm font-black text-gray-400 flex items-center gap-1 sm:gap-2 uppercase tracking-widest"><i class="ph-fill ph-chart-line text-brand" style="color: var(--brand)"></i> 实时走势 <span class="text-[9px] font-normal lowercase hidden sm:inline">(可滑动/缩放历史)</span></h3>
                        <div class="flex gap-1 bg-[#12161b] p-1 rounded-lg border border-white/5 overflow-x-auto">
                            <button onclick="switchFrame('1m')" id="btn-1m" class="px-2 sm:px-3 py-1 rounded-md text-[9px] sm:text-xs font-bold tab-btn-active shrink-0">1分</button>
                            <button onclick="switchFrame('5m')" id="btn-5m" class="px-2 sm:px-3 py-1 rounded-md text-[9px] sm:text-xs font-bold text-gray-500 shrink-0">5分</button>
                            <button onclick="switchFrame('1h')" id="btn-1h" class="px-2 sm:px-3 py-1 rounded-md text-[9px] sm:text-xs font-bold text-gray-500 shrink-0">1时</button>
                            <button onclick="switchFrame('1d')" id="btn-1d" class="px-2 sm:px-3 py-1 rounded-md text-[9px] sm:text-xs font-bold text-gray-500 shrink-0">日线</button>
                        </div>
                    </div>
                    <div id="mainChart" class="flex-1 w-full relative"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let isRunning = false, userAlerts = [], chartInstance = null, currentFrame = '1m';
        let klineData = [], liveCandle = null, lastPointCount = 0;
        let lastPrices = {}, toastTimeout, apiBaseUrl = "", fetchLock = false; 
        let lastHistory = null, lastResultData = null; 
        
        let needResetZoom = true; 
        let triggeredAlerts = new Set(); 

        function startApp() {
            if (typeof echarts === 'undefined') {
                setTimeout(startApp, 100);
                return;
            }
            initChart();
            if(localStorage.getItem('xmeta_url')) document.getElementById('api-url').value = localStorage.getItem('xmeta_url');
            if(localStorage.getItem('xmeta_uid')) document.getElementById('user-uid').value = localStorage.getItem('xmeta_uid');
        }

        window.onload = startApp;

        function playAlertSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
                osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
            } catch(e) {}
        }

        function showToast(msg, isWarning=false) {
            const toast = document.getElementById('toast-msg');
            if (!toast) return;
            document.getElementById('toast-text').innerText = msg;
            toast.className = `fixed bottom-4 sm:bottom-10 right-4 sm:right-10 z-[200] transform transition-all duration-300 translate-y-0 opacity-100 ${isWarning ? 'bg-[#ff4d4f]' : 'bg-[#3b82f6]'} text-white px-4 sm:px-6 py-3 sm:py-4 rounded-xl shadow-2xl font-bold flex items-center gap-3 pointer-events-none text-xs sm:text-sm`;
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.replace('translate-y-0', 'translate-y-20'); toast.classList.replace('opacity-100', 'opacity-0'); }, 3000);
        }

        async function fetchPricesData() {
            if (fetchLock) return;
            fetchLock = true;
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            try {
                const res = await fetch(`${apiBaseUrl}/prices`, { 
                    method: 'GET',
                    cache: 'no-cache',
                    mode: 'cors',
                    signal: controller.signal,
                    headers: { 'Accept': 'application/json', 'cpolar-skip-browser-warning': 'true', 'ngrok-skip-browser-warning': 'true' }
                });
                clearTimeout(timeoutId);
                const result = await res.json();
                if (result.status === 'success') {
                    document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-[#00d8a6] animate-pulse shrink-0";
                    document.getElementById('status-text').innerText = "链路在线 / 正常同步";
                    lastHistory = result.history; lastResultData = result; 
                    if (result.history && result.history[currentFrame]) {
                        klineData = result.history[currentFrame];
                        lastPointCount = klineData.length;
                    }
                    updateUI(result);
                }
            } catch (e) { 
                clearTimeout(timeoutId);
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-[#ff4d4f] shrink-0";
                document.getElementById('status-text').innerText = "链路异常 (检测中)";
            } finally { fetchLock = false; }
        }

        async function toggleMonitor() {
            if (isRunning) return;
            const uid = document.getElementById('user-uid').value.trim();
            if(!uid) return alert("请先填写专属 UID");
            let rawUrl = document.getElementById('api-url').value.trim().replace(/\/$/, "");
            if (location.protocol === 'https:' && rawUrl.startsWith('http://')) {
                rawUrl = rawUrl.replace('http://', 'https://');
                document.getElementById('api-url').value = rawUrl;
            }
            apiBaseUrl = rawUrl;
            localStorage.setItem('xmeta_url', apiBaseUrl);
            localStorage.setItem('xmeta_uid', uid);
            isRunning = true;
            document.getElementById('start-btn').innerText = "正在监视市场";
            document.getElementById('start-btn').disabled = true;
            syncAlerts();
            fetchPricesData();
            setInterval(fetchPricesData, 2000);
        }

        function formatMarketValue(num) {
            if (num >= 100000000) return (num / 100000000).toFixed(2) + "亿";
            if (num >= 10000) return (num / 10000).toFixed(2) + "万";
            return num.toFixed(2);
        }

        function formatRate(rate) {
            if (!rate) return '<span class="text-[9px] sm:text-[10px] text-gray-500">0.00%</span>';
            const color = rate > 0 ? 'text-[#ff4d4f] font-bold' : 'text-[#00d8a6]';
            return `<span class="text-[9px] sm:text-[10px] ${color} font-mono">${rate.toFixed(2)}%</span>`;
        }

        function updateUI(result) {
            const list = document.getElementById('price-list');
            let sumPrice = 0, totalMarket = 0, totalMarketYtd = 0, totalDeal = 0, totalDealAmt = 0, totalDealAmtYtd = 0;
            let validPricesCount = 0;
            let htmlBuffer = [];
            result.data.forEach(item => {
                if (item.price > 0) { sumPrice += item.price; validPricesCount++; }
                totalMarket += item.marketAmount;
                totalDeal += item.dealCount;
                totalDealAmt += item.dealAmount;
                totalMarketYtd += item.marketRate > -99.9 ? (item.marketAmount / (1 + item.marketRate / 100)) : item.marketAmount;
                totalDealAmtYtd += item.dealRate > -99.9 ? (item.dealAmount / (1 + item.dealRate / 100)) : item.dealAmount;
                
                let safeId = item.id || encodeURIComponent(item.name).replace(/%/g, '_');
                let triggeredAlert = userAlerts.find(a => item.name.includes(a.name) && (a.type === 'up' ? item.price >= a.price : item.price <= a.price));
                let isAlert = !!triggeredAlert;
                
                if (isAlert) {
                    let alertKey = item.name + '_' + item.price + '_' + safeId + '_' + triggeredAlert.type;
                    if (!triggeredAlerts.has(alertKey)) {
                        triggeredAlerts.add(alertKey); 
                        playAlertSound(); 
                        let actionText = triggeredAlert.type === 'up' ? '涨至' : '跌至';
                        showToast(`🚨 预警：${item.name} ${actionText} ¥${item.price}`, true);
                    }
                }
                
                // 🚀 完整还原附带图像和双边排版的列表卡片结构
                htmlBuffer.push(`
                    <div id="row-${safeId}" class="item-row flex items-center justify-between p-2.5 sm:p-3 rounded-xl border ${isAlert ? 'bg-[#ff4d4f]/10 border-[#ff4d4f]/30' : 'bg-[#12161b] border-white/5'} transition-all duration-300 gap-1 sm:gap-2">
                        <div class="flex items-center gap-2 sm:gap-3 w-[45%] sm:w-1/3 min-w-0">
                            <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg overflow-hidden bg-white/5 flex-shrink-0 border border-white/5 flex items-center justify-center relative shadow-inner">
                                <span class="text-[8px] sm:text-[9px] text-gray-700 font-bold absolute">无图</span>
                                <img src="${item.image || ''}" loading="lazy" decoding="async" class="w-full h-full object-cover relative z-10" onerror="this.style.opacity='0';">
                            </div>
                            <div class="flex flex-col min-w-0">
                                <span class="text-xs sm:text-sm font-bold text-gray-200 truncate">${item.name}</span>
                                <span class="text-[9px] sm:text-[10px] text-gray-500 uppercase mt-0.5 truncate">成交 ${item.dealCount}</span>
                            </div>
                        </div>
                        <div class="w-[25%] sm:w-1/3 text-right flex flex-col gap-0.5">
                            <span class="font-mono text-xs sm:text-sm ${isAlert?'text-[#ff4d4f] font-black':'text-[#00d8a6]'}">¥${item.price.toFixed(2)}</span>
                            <div>${formatRate(item.minRate)}</div>
                        </div>
                        <div class="w-[30%] sm:w-1/3 text-right flex flex-col gap-0.5">
                            <span class="font-mono text-[11px] sm:text-sm text-slate-400">¥${formatMarketValue(item.marketAmount)}</span>
                            <div>${formatRate(item.marketRate)}</div>
                        </div>
                    </div>
                `);
            });
            list.innerHTML = htmlBuffer.join('');
            document.getElementById('global-market-val').innerText = '¥' + formatMarketValue(totalMarket);
            document.getElementById('global-market-rate').innerHTML = formatRate(totalMarketYtd > 0 ? ((totalMarket - totalMarketYtd) / totalMarketYtd) * 100 : 0);
            document.getElementById('global-deal-val').innerText = totalDeal;
            document.getElementById('global-deal-rate').innerHTML = formatRate(totalDealAmtYtd > 0 ? ((totalDealAmt - totalDealAmtYtd) / totalDealAmtYtd) * 100 : 0);
            const currentAvg = validPricesCount > 0 ? Number((sumPrice / validPricesCount).toFixed(2)) : 0;
            document.getElementById('avg-price').innerText = currentAvg.toFixed(2);
            document.getElementById('item-count').innerText = result.data.length;
            document.getElementById('sync-time').innerText = result.time;
            if (result.temp && result.temp[currentFrame]) {
                let tc = result.temp[currentFrame];
                liveCandle = [tc.o, tc.c, tc.l, tc.h];
            } else if (currentAvg > 0) {
                if (!liveCandle || liveCandle[0] === 0) liveCandle = [currentAvg, currentAvg, currentAvg, currentAvg];
                else { liveCandle[1] = currentAvg; liveCandle[3] = Math.max(liveCandle[3], currentAvg); liveCandle[2] = Math.min(liveCandle[2], currentAvg); }
            }
            renderKLine();
        }

        function switchFrame(frame) {
            currentFrame = frame; liveCandle = null;
            ['1m', '5m', '1h', '1d'].forEach(f => {
                const btn = document.getElementById(`btn-${f}`);
                if (btn) btn.className = f === frame ? "px-2 sm:px-3 py-1 rounded-md text-[9px] sm:text-xs font-bold tab-btn-active shrink-0" : "px-2 sm:px-3 py-1 rounded-md text-[9px] sm:text-xs font-bold text-gray-500 shrink-0";
            });
            if (lastHistory && lastHistory[frame]) { klineData = lastHistory[frame]; lastPointCount = klineData.length; } else { klineData = []; lastPointCount = 0; }
            if (lastResultData && lastResultData.temp && lastResultData.temp[frame]) {
                let tc = lastResultData.temp[frame]; liveCandle = [tc.o, tc.c, tc.l, tc.h];
            }
            needResetZoom = true;
            renderKLine();
        }

        function renderKLine() {
            let displayData = [...klineData];
            if (liveCandle && liveCandle[0] > 0) {
                displayData.push([liveCandle[0], liveCandle[1], liveCandle[2], liveCandle[3]]);
            }
            if (!displayData.length || !chartInstance) return;

            const isMobile = window.innerWidth < 640;
            const viewWindowSize = isMobile ? 35 : 60; 
            const total = displayData.length;
            const xAxisLength = Math.max(total, viewWindowSize);

            let xAxisData = new Array(xAxisLength).fill('');
            let seriesData = displayData.map(d => [d[0], d[1], d[2], d[3]]);
            
            const validData = displayData.filter(d => d && d[0] > 0);
            let minP = Math.min(...validData.map(d => d[2])), maxP = Math.max(...validData.map(d => d[3]));
            let pad = (maxP - minP) * 0.1 || 0.2;
            let currentClose = displayData[displayData.length - 1][1];

            let currentOption = chartInstance.getOption();
            let isAtRight = true;
            let currentStartIdx = 0;
            let currentEndIdx = xAxisLength;

            if (currentOption && currentOption.dataZoom && currentOption.dataZoom[0]) {
                let dz = currentOption.dataZoom[0];
                currentStartIdx = Math.round(dz.startValue);
                currentEndIdx = Math.round(dz.endValue);
                // 判定是否在盯盘模式（滑块末端接近数据尾部）
                isAtRight = dz.endValue >= (xAxisLength - 1.5); 
            }

            let finalZoom = [];
            if (needResetZoom) {
                // 🚀 核心修复：初始显示位置或切换周期时，强行定位到最右侧最新生成的烛图
                let end = xAxisLength;
                let start = Math.max(0, end - viewWindowSize);
                finalZoom = [{ startValue: start, endValue: end }, { startValue: start, endValue: end }];
                needResetZoom = false;
            } 
            else if (isAtRight) {
                // 盯盘模式：保持用户调节后的窗口“比例”，并贴右实时平移
                let viewSpan = currentEndIdx - currentStartIdx;
                let end = xAxisLength;
                let start = Math.max(0, end - viewSpan);
                finalZoom = [{ startValue: start, endValue: end }, { startValue: start, endValue: end }];
            } 
            else {
                // 历史模式：用户正在查看过去的数据，完全冻结坐标，绝不跳动
                finalZoom = [{ startValue: currentStartIdx, endValue: currentEndIdx }, { startValue: currentStartIdx, endValue: currentEndIdx }];
            }

            let option = {
                animation: false,
                xAxis: { data: xAxisData, boundaryGap: true },
                yAxis: { min: (minP - pad).toFixed(2), max: (maxP + pad).toFixed(2) },
                dataZoom: finalZoom,
                series: [{ 
                    type: 'candlestick', 
                    data: seriesData,
                    barCategoryGap: '28%', // 柱子占72%，间隙占28%，永远成比例缩放
                    itemStyle: { 
                        color: '#ff4d4f', color0: '#00d8a6', 
                        borderColor: '#ff4d4f', borderColor0: '#00d8a6', 
                        borderWidth: 1.5 
                    },
                    markLine: { 
                        symbol: ['none', 'none'], data: [{ yAxis: currentClose }], animation: false,
                        lineStyle: { color: '#ff4d4f', type: 'dashed', width: 1.5 },
                        label: { show: true, position: 'end', formatter: '¥{c}', backgroundColor: '#ff4d4f', color: '#fff', padding: [3, 6], borderRadius: 4, fontWeight: 'bold' }
                    }
                }]
            };
            chartInstance.setOption(option, { notMerge: false, lazyUpdate: true });
        }

        function initChart() {
            const chartDom = document.getElementById('mainChart');
            if (!chartDom) return;
            chartInstance = echarts.init(chartDom);
            const isMobile = window.innerWidth < 640;
            chartInstance.setOption({
                animation: false,
                tooltip: { 
                    trigger: 'axis', axisPointer: { type: 'cross' }, 
                    backgroundColor: 'rgba(18,22,27,0.98)', borderColor: '#3b82f6', textStyle: { color: '#fff', fontSize: 11 },
                    formatter: p => {
                        if (!p || !p[0] || !p[0].value) return '';
                        let d = p[0].value;
                        let up = d[2] >= d[1];
                        return `<div class='p-1'><div class='font-bold text-gray-400 mb-2 border-b border-white/10 flex justify-between gap-8'><span>详情</span><span class='${up?'text-[#ff4d4f]':'text-[#00d8a6]'}'>${up?'上涨':'下跌'}</span></div><div class='flex justify-between gap-6 mb-1'>开盘<span>¥${d[1].toFixed(2)}</span></div><div class='flex justify-between gap-6 mb-1'>收盘<span class='font-bold'>¥${d[2].toFixed(2)}</span></div><div class='flex justify-between gap-6 mb-1'>最低<span>¥${d[3].toFixed(2)}</span></div><div class='flex justify-between gap-6'>最高<span>¥${d[4].toFixed(2)}</span></div></div>`;
                    }
                },
                grid: { left: isMobile ? '1%' : '3%', right: isMobile ? '12%' : '8%', bottom: '8%', top: '5%', containLabel: true },
                xAxis: { type: 'category', data: [], axisLine: { show: false }, splitLine: { show: false } },
                yAxis: { type: 'value', scale: true, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.03)', type: 'dashed' } }, axisLabel: { color: '#4a5568', fontSize: isMobile ? 8 : 10 } },
                dataZoom: [ { type: 'inside', xAxisIndex: 0 }, { type: 'slider', xAxisIndex: 0, height: 6, bottom: 0, borderColor: 'transparent', backgroundColor: 'rgba(255,255,255,0.05)', fillerColor: 'rgba(59, 130, 246, 0.4)', handleStyle: { opacity: 0 }, textStyle: { color: 'transparent' } } ],
                series: [{ type: 'candlestick', data: [] }]
            });
            window.addEventListener('resize', () => { if (chartInstance) { chartInstance.resize(); renderKLine(); } });
        }

        function addAlert() {
            const n = document.getElementById('alert-name').value.trim();
            const p = parseFloat(document.getElementById('alert-price').value);
            const t = document.getElementById('alert-type').value;
            if(n && !isNaN(p)) { 
                userAlerts.push({name: n, price: p, type: t}); 
                document.getElementById('alert-name').value = ""; document.getElementById('alert-price').value = ""; 
                renderAlertTags(); syncAlerts(); if (lastResultData) updateUI(lastResultData);
            }
        }
        function removeAlert(i) { userAlerts.splice(i, 1); renderAlertTags(); syncAlerts(); }
        function renderAlertTags() {
            document.getElementById('active-alerts').innerHTML = userAlerts.map((a, i) => {
                const isUp = a.type === 'up';
                const icon = isUp ? '<i class="ph-bold ph-trend-up text-[#ff4d4f]"></i>' : '<i class="ph-bold ph-trend-down text-[#00d8a6]"></i>';
                const symbol = isUp ? '≥' : '≤';
                return `<div class="bg-brand/10 border border-brand/20 px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl flex items-center gap-2 text-[10px] sm:text-xs font-bold text-gray-300 shadow-sm">${icon} ${a.name} ${symbol} ¥${a.price} <i class="ph ph-x-circle cursor-pointer hover:text-[#ff4d4f] transition-colors ml-1" onclick="removeAlert(${i})"></i></div>`;
            }).join('');
        }
        function syncAlerts() {
            if(!apiBaseUrl || !isRunning) return;
            const uid = document.getElementById('user-uid').value;
            showToast("预警配置已部署");
            fetch(`${apiBaseUrl}/update_alerts`, { method: 'POST', mode: 'cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ uid: uid, alerts: userAlerts.map(a => ({ name: a.name, target_price: a.price, type: a.type || 'down' })) }) }).catch(e => console.log("同步延迟"));
        }
    </script>
</body>
</html>
