<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMeta 典藏在线监控站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#020617', darker: '#000000', brand: '#3b82f6', alert: '#ef4444', success: '#10b981', warning: '#f59e0b'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .grid-bg { background-image: radial-gradient(circle at 2px 2px, rgba(59, 130, 246, 0.05) 1px, transparent 0); background-size: 32px 32px; }
        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 grid-bg">
    
    <!-- 全局警报 -->
    <div id="global-alert" class="hidden fixed top-0 left-0 w-full z-[100] bg-alert text-white p-4 shadow-2xl flex items-center justify-between px-10 animate-bounce">
        <div class="flex items-center gap-4">
            <i class="ph-fill ph-warning-octagon text-3xl"></i>
            <div>
                <p class="font-black text-lg uppercase tracking-tighter">🚨 预警触发 🚨</p>
                <p id="alert-detail" class="text-xs font-mono opacity-80 italic">--</p>
            </div>
        </div>
        <button onclick="document.getElementById('global-alert').classList.add('hidden')" class="bg-white/20 px-6 py-2 rounded-full text-sm font-bold">关闭</button>
    </div>

    <div class="max-w-[1400px] mx-auto space-y-6">
        
        <!-- 顶部连接配置 (朋友只需要填一次) -->
        <header class="glass-panel p-6 rounded-[2rem] border-t-4 border-brand">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-5">
                    <div class="w-16 h-16 bg-brand/10 rounded-[1.5rem] flex items-center justify-center border border-brand/20">
                        <i class="ph-fill ph-broadcast text-4xl text-brand"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter">XMeta <span class="text-brand">Live</span> Station</h1>
                        <div class="flex items-center gap-2 mt-1">
                            <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-500"></div>
                            <span id="status-text" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">链路待配置</span>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-4 w-full md:w-auto">
                    <div class="relative flex-1 md:w-80">
                        <i class="ph ph-link absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input id="api-url" type="text" placeholder="输入 Ngrok 转发地址..." class="w-full bg-darker/60 border border-white/10 rounded-2xl pl-12 pr-4 py-4 text-xs text-white focus:ring-2 focus:ring-brand/50 outline-none transition-all">
                    </div>
                    <button onclick="saveAndConnect()" class="bg-brand hover:bg-blue-600 text-white font-black px-10 py-4 rounded-2xl transition-all shadow-xl shadow-brand/20 flex items-center justify-center gap-2 uppercase text-xs tracking-widest">
                        <i class="ph-bold ph-power"></i> 建立在线链路
                    </button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 实时行情面板 -->
            <div class="lg:col-span-4 h-[700px] flex flex-col glass-panel p-6 rounded-[2.5rem]">
                <div class="flex items-center justify-between mb-8 px-2">
                    <h3 class="font-black text-white italic flex items-center gap-3 uppercase tracking-wider text-sm">
                        <i class="ph-fill ph-intersect text-brand"></i> 行情实时矩阵
                    </h3>
                    <div class="px-3 py-1 bg-white/5 rounded-full text-[10px] font-mono text-slate-500">
                        SYNC: <span id="sync-time">--:--</span>
                    </div>
                </div>
                <div id="price-list" class="flex-1 overflow-y-auto space-y-3 log-container pr-2">
                    <!-- 动态生成 -->
                    <div class="flex flex-col items-center justify-center h-full opacity-20 text-center px-10">
                        <i class="ph ph-selection-plus text-6xl mb-4"></i>
                        <p class="text-sm italic">请输入 Ngrok 转发地址并点击“建立在线链路”开始监控</p>
                    </div>
                </div>
            </div>

            <!-- 控制与图表区 -->
            <div class="lg:col-span-8 space-y-6">
                <!-- 指数大屏 -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass-panel p-6 rounded-[2rem] border-l-4 border-brand">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">典藏板块指数 (AVG)</p>
                        <span id="avg-price" class="text-4xl font-black text-white font-mono tracking-tighter">0.00</span>
                    </div>
                    <div class="glass-panel p-6 rounded-[2rem] border-l-4 border-amber-500">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">累计连接终端</p>
                        <span id="online-users" class="text-4xl font-black text-white font-mono tracking-tighter">0</span>
                    </div>
                    <div class="glass-panel p-6 rounded-[2rem] border-l-4 border-emerald-500">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">预警触发频率</p>
                        <span id="alert-stat" class="text-4xl font-black text-white font-mono tracking-tighter">0</span>
                    </div>
                </div>

                <!-- 预警控制中心 -->
                <div class="glass-panel p-8 rounded-[2rem] bg-brand/5 border border-brand/10">
                    <h2 class="text-xl font-black text-white flex items-center gap-3 mb-6 italic">
                        <i class="ph-fill ph-target text-brand"></i> 智能预警配置
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                        <input id="alert-name" type="text" placeholder="藏品名称 (如: 步辇图)" class="md:col-span-6 bg-darker/60 border border-white/10 rounded-2xl px-5 py-4 text-sm text-white focus:border-brand outline-none transition-all">
                        <input id="alert-price" type="number" placeholder="预警价 (元)" class="md:col-span-4 bg-darker/60 border border-white/10 rounded-2xl px-5 py-4 text-sm text-white font-mono">
                        <button onclick="addAlert()" class="md:col-span-2 bg-white text-darker font-black rounded-2xl hover:bg-brand hover:text-white transition-all uppercase text-[10px] tracking-widest">添加任务</button>
                    </div>
                    <div id="active-alerts" class="mt-6 flex flex-wrap gap-2"></div>
                </div>

                <!-- 图表趋势 -->
                <div class="glass-panel p-8 rounded-[2rem] h-[330px]">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let chartInstance = null;
        let priceHistory = [];
        let labels = [];
        let userAlerts = [];
        let alertCount = 0;

        // 初始化
        function init() {
            initChart();
            // 自动加载上次使用的 URL
            const savedUrl = localStorage.getItem('xmeta_api_url');
            if (savedUrl) {
                document.getElementById('api-url').value = savedUrl;
                // 如果想让朋友打开就自动连，可以开启下面这一行
                // toggleMonitor(); 
            }
        }

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: priceHistory,
                        borderColor: '#3b82f6',
                        borderWidth: 4,
                        pointRadius: 0,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.1)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#475569' } }
                    }
                }
            });
        }

        function saveAndConnect() {
            const url = document.getElementById('api-url').value.trim().replace(/\/$/, "");
            if (!url) return;
            localStorage.setItem('xmeta_api_url', url);
            toggleMonitor();
        }

        async function fetchPrices() {
            const baseUrl = document.getElementById('api-url').value.trim().replace(/\/$/, "");
            try {
                const res = await fetch(`${baseUrl}/prices`);
                const result = await res.json();
                if (result.status === 'success') {
                    document.getElementById('status-dot').className = "w-2.5 h-2.5 rounded-full bg-success animate-pulse";
                    document.getElementById('status-text').innerText = "链路在线: 实时接收中";
                    document.getElementById('status-text').className = "text-[10px] font-bold text-success uppercase tracking-widest italic";
                    return result;
                }
            } catch (e) {
                document.getElementById('status-dot').className = "w-2.5 h-2.5 rounded-full bg-alert";
                document.getElementById('status-text').innerText = "链路断开: 请确认 Python/Ngrok 正常";
                document.getElementById('status-text').className = "text-[10px] font-bold text-alert uppercase tracking-widest italic";
                return null;
            }
        }

        function toggleMonitor() {
            if (isRunning) return;
            isRunning = true;
            
            setInterval(async () => {
                const result = await fetchPrices();
                if (result) updateUI(result);
            }, 3000);
        }

        function updateUI(result) {
            const data = result.data;
            const listContainer = document.getElementById('price-list');
            listContainer.innerHTML = "";
            let sum = 0;
            let currentTriggered = null;

            document.getElementById('online-users').innerText = result.online_users || 0;
            document.getElementById('sync-time').innerText = result.time;

            data.forEach(item => {
                sum += item.price;
                let isAlert = false;
                userAlerts.forEach(alert => {
                    if (item.name.includes(alert.name) && item.price <= alert.price) {
                        isAlert = true;
                        currentTriggered = { name: item.name, price: item.price, target: alert.price };
                    }
                });

                listContainer.innerHTML += `
                    <div class="flex items-center justify-between p-5 rounded-2xl border transition-all ${isAlert ? 'bg-alert/20 border-alert animate-bounce' : 'bg-white/5 border-white/5 hover:bg-white/10'}">
                        <div class="flex flex-col">
                            <span class="text-sm font-black italic ${isAlert ? 'text-alert' : 'text-slate-200'}">${item.name}</span>
                            <span class="text-[10px] font-mono text-slate-500 uppercase">${isAlert ? '🚨 Target Price Reached' : 'Current Floor'}</span>
                        </div>
                        <div class="text-sm font-black font-mono ${isAlert ? 'text-alert' : 'text-success'}">¥${item.price.toFixed(2)}</div>
                    </div>
                `;
            });

            const avg = sum / (data.length || 1);
            document.getElementById('avg-price').innerText = avg.toFixed(2);
            
            if (currentTriggered) {
                document.getElementById('global-alert').classList.remove('hidden');
                document.getElementById('alert-detail').innerText = `${currentTriggered.name} 触线! 当前: ¥${currentTriggered.price} | 目标: ¥${currentTriggered.target}`;
                alertCount++;
                document.getElementById('alert-stat').innerText = alertCount;
            }

            priceHistory.push(avg);
            labels.push("");
            if(priceHistory.length > 20) { priceHistory.shift(); labels.shift(); }
            chartInstance.update();
        }

        function addAlert() {
            const name = document.getElementById('alert-name').value.trim();
            const price = parseFloat(document.getElementById('alert-price').value);
            if (name && !isNaN(price)) {
                userAlerts.push({name, price});
                document.getElementById('alert-name').value = "";
                document.getElementById('alert-price').value = "";
                renderAlertTags();
            }
        }

        function renderAlertTags() {
            const container = document.getElementById('active-alerts');
            container.innerHTML = userAlerts.map((a, i) => `
                <div class="bg-brand/10 border border-brand/30 px-4 py-2 rounded-xl flex items-center gap-3">
                    <span class="text-xs font-black text-white italic uppercase">${a.name} < ¥${a.price}</span>
                    <i class="ph ph-trash text-slate-500 hover:text-alert cursor-pointer" onclick="userAlerts.splice(${i},1);renderAlertTags()"></i>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
